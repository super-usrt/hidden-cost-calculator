<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Cost Calculator</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='12' fill='%232563eb'/><text x='50%' y='55%' text-anchor='middle' fill='white' font-size='18' font-weight='bold' dy='.3em'>HC</text></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">

<div class="max-w-5xl mx-auto p-6">

  <!-- Header -->
  <div class="flex items-center justify-center mb-10 gap-3">
    <div class="w-10 h-10 bg-blue-600 text-white flex items-center justify-center rounded-xl font-bold">
      HC
    </div>
    <div>
      <h1 class="text-2xl md:text-3xl font-bold">Hidden Cost</h1>
      <p class="text-gray-600 text-sm">Plan smarter. Avoid surprises.</p>
    </div>
  </div>

  <!-- Form -->
  <div class="grid md:grid-cols-3 gap-4">
    <select id="country" class="p-3 border rounded-lg">
      <option value="canada">Canada</option>
      <option value="germany">Germany</option>
      <option value="france">France</option>
      <option value="usa">USA</option>
      <option value="uk">UK</option>
    </select>

    <select id="purpose" class="p-3 border rounded-lg">
      <option value="study">Study</option>
      <option value="work">Work</option>
    </select>

    <input id="budget" type="number" placeholder="Monthly budget ($)" class="p-3 border rounded-lg">
  </div>

  <button onclick="analyze()" class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">
    Reveal Hidden Costs
  </button>

  <!-- Results -->
  <div id="results" class="hidden mt-6 bg-white p-6 rounded-xl border">
    <h2 id="title" class="text-xl font-bold mb-4"></h2>

    <h3 class="font-semibold mb-2">One-time costs</h3>
    <ul id="oneTime" class="list-disc pl-5 mb-4"></ul>

    <h3 class="font-semibold mb-2">Monthly costs</h3>
    <ul id="monthly" class="list-disc pl-5"></ul>
  </div>

  <!-- Internal Links -->
  <div id="linksContainer" class="mt-8"></div>

</div>

<script>

// DATA
const data = {
  canada: {
    study: {
      oneTime: ["Visa fee", "Flight ticket", "Initial rent deposit"],
      monthly: ["Rent", "Food", "Transport"]
    },
    work: {
      oneTime: ["Work permit", "Flight", "Setup costs"],
      monthly: ["Rent", "Utilities", "Transport"]
    }
  },
  germany: {
    study: {
      oneTime: ["Visa", "Blocked account", "Flight"],
      monthly: ["Rent", "Food", "Insurance"]
    },
    work: {
      oneTime: ["Work visa", "Relocation"],
      monthly: ["Rent", "Transport", "Insurance"]
    }
  },
  france: {
    study: {
      oneTime: ["Visa", "Campus fees"],
      monthly: ["Rent", "Food", "Transport"]
    },
    work: {
      oneTime: ["Work visa"],
      monthly: ["Rent", "Bills", "Food"]
    }
  }
};

// ANALYZE FUNCTION
function analyze() {
  const country = document.getElementById('country').value;
  const purpose = document.getElementById('purpose').value;

  const result = data[country]?.[purpose];

  if (!result) return;

  document.getElementById('results').classList.remove('hidden');
  document.getElementById('title').innerText =
    `Hidden costs for ${country} (${purpose})`;

  const oneTimeList = document.getElementById('oneTime');
  const monthlyList = document.getElementById('monthly');

  oneTimeList.innerHTML = '';
  monthlyList.innerHTML = '';

  result.oneTime.forEach(item => {
    const li = document.createElement('li');
    li.textContent = item;
    oneTimeList.appendChild(li);
  });

  result.monthly.forEach(item => {
    const li = document.createElement('li');
    li.textContent = item;
    monthlyList.appendChild(li);
  });

  renderLinks(country, purpose);
}

// INTERNAL LINKS
function renderLinks(currentCountry, currentPurpose) {
  const container = document.getElementById('linksContainer');
  container.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'grid grid-cols-2 md:grid-cols-3 gap-2';

  Object.keys(data).forEach(c => {
    Object.keys(data[c]).forEach(p => {
      if (c === currentCountry && p === currentPurpose) return;

      const a = document.createElement('a');
      a.href = `/${c}/${p}`;
      a.textContent = `${c} (${p})`;
      a.className = 'text-blue-600 hover:underline';

      grid.appendChild(a);
    });
  });

  container.appendChild(grid);
}

// URL ROUTING
function parseURL() {
  const path = window.location.pathname.split('/').filter(Boolean);

  if (path.length === 2) {
    document.getElementById('country').value = path[0];
    document.getElementById('purpose').value = path[1];
    analyze();
  }
}

window.onload = parseURL;

</script>

</body>
</html>
